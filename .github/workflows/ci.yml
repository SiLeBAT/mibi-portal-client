name: Mibi Client CI Project
on: 
  workflow_dispatch:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop
      - task/mpc656
jobs:
  preparation:
    name: checkout code
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v5
        with:
          ref: task/mpc656
      - name: Install NodeJS
        uses: actions/setup-node@v3
        with:
          node-version: 16.17.1
      - name: print node version
        run: node -v
      - name: print ls -al
        run: ls -al

